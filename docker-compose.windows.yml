services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  orchestrator:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=sqlite:////app/data/orchestrator.db
    depends_on:
      - redis
      - qdrant
    volumes:
      - orchestrator_data:/app/data
      - orchestrator_logs:/app/logs
      - orchestrator_checkpoints:/app/checkpoints
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=sqlite:////app/data/orchestrator.db
    depends_on:
      - redis
      - qdrant
    volumes:
      - orchestrator_data:/app/data
      - orchestrator_logs:/app/logs
      - orchestrator_checkpoints:/app/checkpoints
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
  orchestrator_data:
  orchestrator_logs:
  orchestrator_checkpoints:
