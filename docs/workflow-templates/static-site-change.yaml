id: static-site-change
display_name: Static Site Change
workflow_profile: frontend_only
review_policy:
  auto_promote_if: [no_deletes, no_dependency_changes]
  hold_if: [has_deletes, dependency_change]
allowed_ops: [write_file, read_file, append_file, replace_in_file, shell_command]
verification: static
auto_promote_eligible: true
risk_flags: [modifies_config]
