version: "3.9"

services:
  browser-session:
    image: mcr.microsoft.com/playwright:v1.61.0-noble
    container_name: orchestrator-browser-session
    ports:
      # Bind to localhost by default (WF-C security hardening). Both noVNC
      # and CDP grant full control of the persistent Chrome/ChatGPT session
      # with no additional auth (x11vnc runs -nopw; CDP has none by design),
      # so publishing them beyond loopback is a full account-takeover
      # surface. To reach them from another host, use an SSH tunnel (see
      # docs/roadmap/done/workflow/wf-b-browser-session-runbook.md) instead
      # of widening these binds. Only override NOVNC_BIND_HOST /
      # CDP_BIND_HOST (e.g. to 0.0.0.0) if you understand and accept that
      # exposure — never do so on a machine reachable from an untrusted
      # network.
      - "${NOVNC_BIND_HOST:-127.0.0.1}:6080:6080"    # noVNC — view browser from host or phone
      - "${CDP_BIND_HOST:-127.0.0.1}:9222:9223"       # Chrome DevTools Protocol — relay connects here
    environment:
      - DISPLAY=:99
    volumes:
      # ONLY the relay exchange folder — not the entire workflow directory
      - ./relay:/relay:rw
      # Persistent Chrome profile — login session survives restarts
      - browser-session-profile:/home/pwuser/.config/chromium
    cap_add:
      - SYS_PTRACE
    restart: unless-stopped
    command: >
      bash -lc '
        set -e
        apt-get update
        apt-get install -y fluxbox x11vnc websockify novnc socat

        rm -f /tmp/.X99-lock /tmp/.X11-unix/X99

        Xvfb :99 -screen 0 1280x1024x24 &
        sleep 2

        fluxbox &
        sleep 1

        x11vnc -display :99 -forever -nopw -quiet -listen 0.0.0.0 -rfbport 5900 &
        sleep 1

        websockify --web=/usr/share/novnc 6080 localhost:5900 &
        sleep 1

        /ms-playwright/chromium-*/chrome-linux/chrome \
          --no-sandbox \
          --disable-dev-shm-usage \
          --no-first-run \
          --no-default-browser-check \
          --remote-allow-origins=* \
          --remote-debugging-port=9222 \
          --remote-debugging-address=0.0.0.0 \
          --user-data-dir=/home/pwuser/.config/chromium \
          --display=:99 \
          https://chatgpt.com &
          socat TCP-LISTEN:9223,fork,bind=0.0.0.0,reuseaddr TCP:127.0.0.1:9222 &
        sleep infinity
      '

volumes:
  browser-session-profile:
